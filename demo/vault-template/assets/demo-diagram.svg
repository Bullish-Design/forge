<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Forge v2 Demo Pipeline</title>
  <desc id="desc">Kiln rebuild events flow into overlay SSE while API calls proxy to dummy backend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="720" height="220" fill="url(#bg)" rx="14"/>
  <g fill="#e0e1dd" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="14">
    <rect x="30" y="70" width="190" height="80" fill="#415a77" rx="10"/>
    <text x="52" y="115">kiln-fork watch</text>

    <rect x="265" y="70" width="190" height="80" fill="#778da9" rx="10"/>
    <text x="292" y="110">forge-overlay</text>
    <text x="292" y="130">inject + SSE + proxy</text>

    <rect x="500" y="70" width="190" height="80" fill="#415a77" rx="10"/>
    <text x="531" y="110">dummy API server</text>
    <text x="531" y="130">apply/undo replies</text>

    <text x="232" y="102">webhook</text>
    <text x="472" y="102">/api/*</text>
  </g>
  <g stroke="#e0e1dd" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M220 110 L265 110"/>
    <path d="M455 110 L500 110"/>
  </g>
</svg>
